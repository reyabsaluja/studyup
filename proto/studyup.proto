syntax = "proto3";

package studyup;

service StudyService {
  rpc GetStudyRecommendations(RecommendationRequest) returns (RecommendationResponse);
  rpc LogActivity(ActivityRequest) returns (ActivityResponse);
  rpc GetAnalyticsSummary(AnalyticsRequest) returns (AnalyticsSummary);
}

message RecommendationRequest {
  string user_id = 1;
  string course_id = 2;
}

message Recommendation {
  string id = 1;
  string title = 2;
  string description = 3;
  string type = 4;
  float priority = 5;
  string resource_url = 6;
}

message RecommendationResponse {
  repeated Recommendation recommendations = 1;
}

message ActivityRequest {
  string user_id = 1;
  string action = 2;
  map<string, string> metadata = 3;
  int64 timestamp = 4;
}

message ActivityResponse {
  bool success = 1;
  string message = 2;
}

message AnalyticsRequest {
  string user_id = 1;
  string date_range = 2;
}

message AnalyticsSummary {
  string user_id = 1;
  int32 total_study_hours = 2;
  int32 sessions_completed = 3;
  float average_score = 4;
  repeated TopicBreakdown topic_breakdown = 5;
  repeated DailyActivity daily_activity = 6;
}

message TopicBreakdown {
  string topic = 1;
  float hours_spent = 2;
  float mastery_level = 3;
}

message DailyActivity {
  string date = 1;
  float hours = 2;
  int32 sessions = 3;
}
